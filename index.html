<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip Planner Pro</title>

<style>
body { font-family: 'Segoe UI', Tahoma; margin: 0; display: flex; height: 100vh; background: #f0f2f5; }
#login-screen { position: fixed; inset: 0; background: #2c3e50; display: flex; align-items: center; justify-content: center; color: white; }
.login-card { background: white; color: #333; padding: 40px; border-radius: 15px; width: 300px; text-align: center; }

#main-app { display: none; width: 100%; }
.sidebar { width: 380px; background: white; display: flex; flex-direction: column; }
.header { padding: 20px; background: #007aff; color: white; }
.list-container { flex-grow: 1; overflow-y: auto; padding: 15px; }

.location-item {
    background: white; border: 1px solid #ddd;
    padding: 15px; margin-bottom: 10px;
    border-radius: 10px; position: relative; cursor: pointer;
}

.time-badge { position: absolute; top: 10px; right: 10px; font-size: 11px; }
.type-tag { font-size: 10px; color: #007aff; }

.controls { padding: 20px; }
input, select, textarea { width: 100%; margin-bottom: 10px; padding: 8px; }
button { width: 100%; padding: 10px; background: #007aff; color: white; border: none; }
</style>
</head>

<body>

<div id="login-screen">
    <div class="login-card">
        <h2>Trip Planner</h2>
        <input id="username-input" placeholder="Username">
        <input id="password-input" type="password" placeholder="Password">
        <button onclick="handleAuth()">Login</button>
    </div>
</div>

<div id="main-app">
    <div class="sidebar">
        <div class="header">
            <h2 id="display-user"></h2>
        </div>

        <div id="location-list" class="list-container"></div>

        <div class="controls">
            <input id="new-name" placeholder="Place name">
            <select id="new-type">
                <option>Restaurant</option>
                <option>Experience</option>
                <option>General</option>
            </select>
            <input type="time" id="new-time">
            <textarea id="new-details" placeholder="Details"></textarea>
            <button onclick="addLocation()">Add</button>
        </div>
    </div>
</div>

<script>
let currentUser = "";

let db = JSON.parse(localStorage.getItem('trip_db_v3')) || {
    users: {},
    locations: []
};

function handleAuth() {
    const user = username-input.value.trim();
    const pass = password-input.value.trim();

    if (!db.users[user]) {
        db.users[user] = { password: pass };
        saveToDB();
    }

    if (db.users[user].password === pass) {
        currentUser = user;
        login-screen.style.display = "none";
        main-app.style.display = "flex";
        display-user.innerText = user + "'s Trip";
        renderLocations();
    }
}

function renderLocations() {
    const container = document.getElementById('location-list');
    container.innerHTML = "";

    const sorted = db.locations.sort((a, b) => a.time.localeCompare(b.time));

    sorted.forEach((loc, index) => {
        const div = document.createElement('div');
        div.className = "location-item";

        // Open Google Maps in new tab
        div.onclick = (e) => {
            if (e.target.classList.contains("delete-btn")) return;

            window.open(
                "https://www.google.com/maps/search/?api=1&query=" 
                + encodeURIComponent(loc.name),
                "_blank"
            );
        };

        const detailLabel = loc.type === "Restaurant" ? "📜 MENU" : "🎢 ACTIVITY";

        div.innerHTML = `
            <span class="time-badge">${loc.time}</span>
            <span class="type-tag">${loc.type}</span>
            <strong>${loc.name}</strong>

            <button class="delete-btn" style="
                position:absolute;
                bottom:10px;
                right:10px;
                background:#ff3b30;
                color:white;
                border:none;
                padding:5px 8px;
                border-radius:5px;
                font-size:12px;
                cursor:pointer;
            ">Delete</button>

            <div class="detail-box">
                <small><strong>${detailLabel}:</strong></small><br>
                ${loc.details}
            </div>
        `;

        // Delete
        div.querySelector(".delete-btn").onclick = () => {
            db.locations.splice(index, 1);
            saveToDB();
            renderLocations();
        };

        container.appendChild(div);
    });
}

function addLocation() {
    const name = new-name.value;
    const type = new-type.value;
    const time = new-time.value;
    const details = new-details.value;

    if (name && time) {
        db.locations.push({ name, type, time, details });
        saveToDB();
        renderLocations();
    }
}

function saveToDB() {
    localStorage.setItem('trip_db_v3', JSON.stringify(db));
}
</script>

</body>
</html>
