<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Planner Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma; margin: 0; display: flex; height: 100vh; background: #f0f2f5; }
        #login-screen { position: fixed; inset: 0; background: #2c3e50; display: flex; align-items: center; justify-content: center; color: white; z-index: 100; }
        .login-card { background: white; color: #333; padding: 40px; border-radius: 15px; width: 300px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        #main-app { display: none; width: 100%; }
        .sidebar { width: 380px; background: white; display: flex; flex-direction: column; border-right: 1px solid #ddd; }
        .header { padding: 20px; background: #007aff; color: white; }
        .list-container { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .location-item { background: white; border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 10px; position: relative; cursor: pointer; transition: background 0.2s; }
        .location-item:hover { background: #f9f9f9; }
        .time-badge { position: absolute; top: 10px; right: 10px; font-size: 11px; font-weight: bold; color: #666; }
        .type-tag { font-size: 10px; color: #007aff; text-transform: uppercase; font-weight: bold; }
        .controls { padding: 20px; border-top: 1px solid #eee; }
        input, select, textarea { width: 100%; margin-bottom: 10px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007aff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        .detail-box { margin-top: 10px; font-size: 13px; color: #555; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2>Trip Planner</h2>
        <input id="username-input" placeholder="Username">
        <input id="password-input" type="password" placeholder="Password">
        <button onclick="handleAuth()">Login / Sign Up</button>
    </div>
</div>

<div id="main-app">
    <div class="sidebar">
        <div class="header">
            <h2 id="display-user"></h2>
        </div>

        <div id="location-list" class="list-container"></div>

        <div class="controls">
            <input id="new-name" placeholder="Place name (e.g. Eiffel Tower)">
            <select id="new-type">
                <option>Restaurant</option>
                <option>Experience</option>
                <option>General</option>
            </select>
            <input type="time" id="new-time">
            <textarea id="new-details" placeholder="Details or Notes"></textarea>
            <button onclick="addLocation()">Add to Itinerary</button>
        </div>
    </div>
</div>

<script>
let currentUser = "";

// Load DB from localStorage or init empty
let db = JSON.parse(localStorage.getItem('trip_db_v3')) || {
    users: {},
    locations: []
};

function handleAuth() {
    // FIX: Using document.getElementById to avoid hyphen-subtraction errors
    const user = document.getElementById('username-input').value.trim();
    const pass = document.getElementById('password-input').value.trim();

    if (!user || !pass) {
        alert("Please enter both username and password");
        return;
    }

    // Initialize user if not exists (Sign-up logic)
    if (!db.users[user]) {
        db.users[user] = { password: pass };
        saveToDB();
    }

    // Validate password
    if (db.users[user].password === pass) {
        currentUser = user;
        document.getElementById('login-screen').style.display = "none";
        document.getElementById('main-app').style.display = "flex";
        document.getElementById('display-user').innerText = user + "'s Trip";
        renderLocations();
    } else {
        alert("Incorrect password");
    }
}

function renderLocations() {
    const container = document.getElementById('location-list');
    container.innerHTML = "";

    // Sort locations by time
    const sorted = db.locations.sort((a, b) => a.time.localeCompare(b.time));

    sorted.forEach((loc, index) => {
        const div = document.createElement('div');
        div.className = "location-item";
        
        // Open Google Maps in new tab on click
        div.onclick = (e) => {
            if (e.target.classList.contains("delete-btn")) return;
            window.open(
                "https://google.com" 
                + encodeURIComponent(loc.name),
                "_blank"
            );
        };

        const detailLabel = loc.type === "Restaurant" ? "📜 MENU/NOTES" : "🎢 ACTIVITY";

        div.innerHTML = `
            <span class="time-badge">${loc.time}</span>
            <span class="type-tag">${loc.type}</span>
            <br><strong>${loc.name}</strong>
            <button class="delete-btn" style="
                position:absolute;
                bottom:10px;
                right:10px;
                background:#ff3b30;
                color:white;
                border:none;
                padding:5px 8px;
                border-radius:5px;
                font-size:12px;
                cursor:pointer;
            ">Delete</button>
            <div class="detail-box">
                <small><strong>${detailLabel}:</strong></small><br>
                ${loc.details || 'No additional details'}
            </div>
        `;

        // Delete button logic
        div.querySelector(".delete-btn").onclick = (e) => {
            e.stopPropagation(); // Stop the click from opening Google Maps
            db.locations.splice(index, 1);
            saveToDB();
            renderLocations();
        };

        container.appendChild(div);
    });
}

function addLocation() {
    const nameInput = document.getElementById('new-name');
    const typeInput = document.getElementById('new-type');
    const timeInput = document.getElementById('new-time');
    const detailsInput = document.getElementById('new-details');

    if (nameInput.value && timeInput.value) {
        db.locations.push({ 
            name: nameInput.value, 
            type: typeInput.value, 
            time: timeInput.value, 
            details: detailsInput.value 
        });
        
        saveToDB();
        renderLocations();

        // Clear inputs
        nameInput.value = "";
        timeInput.value = "";
        detailsInput.value = "";
    } else {
        alert("Please enter a name and a time.");
    }
}

function saveToDB() {
    localStorage.setItem('trip_db_v3', JSON.stringify(db));
}
</script>

</body>
</html>
